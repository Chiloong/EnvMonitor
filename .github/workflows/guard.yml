name: Release Guard

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag format
        run: |
          echo "Checking tag format..."
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+.*$ ]]; then
            echo "Invalid tag format"
            exit 1
          fi

      - name: Check required files
        run: |
          test -f main.py || (echo "missing main.py" && exit 1)
          test -f .github/workflows/run.yml || (echo "missing run.yml" && exit 1)

      - name: Check repo state
        run: |
          echo "Guard check passed ✔"
